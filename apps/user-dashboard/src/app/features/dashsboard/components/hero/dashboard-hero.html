<div class="hero">
  <div class="hero__overlay"></div>

  <div class="hero__content">
    <div class="hero__badge">
      <img
        class="hero__badge-icon"
        src="assets/icons/shield.svg"
        alt=""
        aria-hidden="true"
      />
      Over 12,000 premium vehicles nationwide
    </div>

    <h1 class="hero__title">
      Find Your <span class="hero__title--accent">Dream</span><br />
      Car Today
    </h1>

    <p class="hero__subtitle">
      The premium marketplace for luxury and exotic vehicles. Buy, sell,<br />
      and discover extraordinary cars with confidence.
    </p>

    <div class="hero__search">
      <div class="hero__search-field">
        <cm-input
          class="hero__search-input-cmp"
          type="text"
          placeholder="Make, model, or keyword."
          icon="assets/icons/search.svg"
          iconPosition="left"
          radius="none"
          size="md"
        />
      </div>

      <div class="hero__search-divider"></div>

      <div class="hero__search-field">
        <cm-input
          class="hero__search-input-cmp"
          type="text"
          placeholder="Location"
          icon="assets/icons/location.svg"
          iconPosition="left"
          radius="none"
          size="md"
        />
      </div>

      <cm-button
        label="Search"
        variant="primary"
        radius="pill"
        size="md"
        icon="assets/icons/search-white.svg"
        iconPosition="left"
        iconGap="sm"
      />
    </div>

    <div class="hero__categories">
      <button>Sports Cars</button>
      <button>SUVs</button>
      <button>Sedans</button>
      <button>Supercars</button>
      <button>EVs</button>
    </div>
  </div>
</div>

<div class="stats">
  <div class="stats__inner">
    <div class="stats__item">
      <span class="stats__value">12,400+</span>
      <span class="stats__label">Listings</span>
    </div>
    <div class="stats__divider"></div>
    <div class="stats__item">
      <span class="stats__value">98%</span>
      <span class="stats__label">Verified Sellers</span>
    </div>
    <div class="stats__divider"></div>
    <div class="stats__item">
      <span class="stats__value">
        4.9
        <img class="stats__star" src="assets/icons/star.svg" alt="star" />
      </span>
      <span class="stats__label">Avg Rating</span>
    </div>
    <div class="stats__divider"></div>
    <div class="stats__item">
      <span class="stats__value">48h</span>
      <span class="stats__label">Avg Sale Time</span>
    </div>
  </div>
</div>
